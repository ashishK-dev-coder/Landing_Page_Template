services:
  postgres:
    image: postgres:16-alpine
    container_name: tws-landing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: landing_page_template
    ports:
      - "5432:5432"
    volumes:
      - tws_pg_data:/var/lib/postgresql/data

volumes:
  tws_pg_data:
